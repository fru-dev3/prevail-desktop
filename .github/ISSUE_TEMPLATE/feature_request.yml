name: Feature request
description: A new feature, panel, integration, or workflow you'd like in the desktop app.
title: "feat: "
labels: ["enhancement"]
body:
  - type: textarea
    id: usecase
    attributes:
      label: Use case
      description: What are you trying to accomplish? What does the moment look like where you'd reach for this?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like Prevail to handle this? Be concrete — the panel, the button, the setting, the flow.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Anything you tried, or other tools that do this well.
    validations:
      required: false
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Chat / Council
        - Work board / Automations
        - Apps / Connectors
        - Privacy / Safety
        - Editor / Settings
        - Other
    validations:
      required: false
