# Security gates (audit B12 / O103 / O92). Separate from release.yml so it never
# blocks a release build, but surfaces vulnerable deps + leaked secrets on every
# push to main and every PR. Rust + JS dependency audit + secret scan.
name: security

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  cargo-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Rust dependency audit
        # RUSTSEC-2026-0185 (quinn-proto, transitive QUIC dep) is accepted: this
        # desktop app is not a QUIC server reassembling untrusted inbound streams,
        # so the memory-exhaustion vector isn't reachable. Revisit on upstream fix.
        # (Unmaintained gtk-rs advisories are warnings and don't fail the build.)
        run: cd src-tauri && cargo audit --ignore RUSTSEC-2026-0185

  npm-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: JS dependency audit (fail on high)
        run: npm audit --audit-level=high

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Lint gate scoped to the BUG classes (correctness + suspicious), not style.
  # A blanket -D warnings would false-fail on Tauri #[command] fns clippy can't
  # see are invoked from JS; this gate catches real defects (e.g. .flatten() that
  # loops forever on a read error) without churn.
  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri
      - name: Clippy (deny correctness + suspicious)
        run: cd src-tauri && cargo clippy --all-targets -- -D clippy::correctness -D clippy::suspicious

  # Software Bill of Materials: a CycloneDX SBOM of the Rust dependency tree,
  # published as a build artifact for supply-chain auditing (O92 sibling).
  sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx --locked
      - name: Generate CycloneDX SBOM
        run: cd src-tauri && cargo cyclonedx --format json
      - name: Upload SBOM
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sbom-cyclonedx
          path: src-tauri/**/*.cdx.json
          if-no-files-found: warn
