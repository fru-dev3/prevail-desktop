name: Release

on:
  push:
    tags:
      - "v*"

# Allow the action to create the GitHub release and upload assets.
permissions:
  contents: write

jobs:
  release:
    name: Build, sign & notarize (Apple Silicon)
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      # Privacy gate: block the release if any real/personal data leaked into the
      # shipped demo vault. Runs FIRST so a leak never gets signed/notarized.
      - name: Scrub gate (no personal data in demo vault)
        run: bash scripts/scrub-gate.sh

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20

      # Engine sidecar: check out the CLI repo + Bun so prepare-sidecar.sh (run
      # by beforeBuildCommand) can compile the bundled `prevail` engine in CI.
      - name: Checkout engine (prevail-cli)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          repository: fru-dev3/prevail-cli
          path: engine
      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest
      - name: Install engine deps
        run: cd engine && bun install

      # Browser automation needs a REAL on-disk playwright-core shipped next to
      # the sidecar (prepare-sidecar.sh stages it into resources/node_modules and
      # playwright-resolve.ts loads it at runtime relative to the executable). The
      # compiled binary's in-binary copy is unusable, so this dependency must be
      # present here or the build would ship a broken "browser unavailable" app.
      - name: Verify engine playwright-core present
        run: test -f engine/node_modules/playwright-core/package.json || (echo "playwright-core missing from engine deps" && exit 1)

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Rust build
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri -> target

      - name: Install JS dependencies
        run: npm ci

      # Desktop smoke ring (G2): the five load-bearing screens must render and
      # their primary controls must invoke the right backend command, or the
      # tag does not build. Runs against the real frontend with Tauri IPC mocked
      # (e2e/tauri-mock.ts) - catches the React regressions a typecheck can't.
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Desktop smoke tests
        run: npx playwright test

      - name: Build, sign & notarize
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Where prepare-sidecar.sh finds the engine repo (checked out above).
          PREVAIL_CLI_DIR: ${{ github.workspace }}/engine
          # Sentry source-map upload (macOS job only, to avoid a double upload from
          # the Windows job). When unset, the Vite plugin is fully disabled and the
          # build is unchanged. Org/project are hard-coded in vite.config.ts.
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          # Telemetry client keys (write/ingest-only; safe to embed). Injected
          # from secrets so the tracked repo carries no key and forks don't
          # phone home. Unset -> telemetry SDK stays inert (module is no-op).
          VITE_POSTHOG_KEY: ${{ secrets.VITE_POSTHOG_KEY }}
          VITE_POSTHOG_HOST: ${{ secrets.VITE_POSTHOG_HOST }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          # --- Developer ID signing + notarization ---
          # APPLE_CERTIFICATE is a base64 legacy-format p12 holding only the
          # "Developer ID Application" identity plus the Apple G2 intermediate;
          # OpenSSL-3 default p12s fail `security import` on the runner.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # --- Updater artifact signing (in-app auto-update feed) ---
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          args: --target aarch64-apple-darwin
          tagName: ${{ github.ref_name }}
          releaseName: "Prevail ${{ github.ref_name }}"
          releaseBody: "See CHANGELOG.md for details."
          releaseDraft: false
          # Release ring: a fresh tag is a PRERELEASE - the auto-updater's
          # 'latest' feed ignores it until `promote` flips it. Soak first.
          prerelease: true

      # The README badge and prevail-web download links point at the
      # version-independent releases/latest/download/Prevail-mac-arm64.dmg,
      # so every release must also carry the DMG under that stable name.
      - name: Upload stable-name DMG alias
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          dmg=$(ls src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/Prevail_*_aarch64.dmg)
          cp "$dmg" Prevail-mac-arm64.dmg
          gh release upload "${{ github.ref_name }}" Prevail-mac-arm64.dmg --clobber

  # Windows build. Same Tauri codebase: the only platform-specific pieces are the
  # NSIS installer target and a Windows-compiled engine sidecar (handled by
  # prepare-sidecar.sh, which now emits prevail-<triple>.exe). Runs after the
  # macOS job so the GitHub release already exists and tauri-action merges the
  # Windows entry into latest.json (keeping the cross-platform auto-updater feed
  # intact) instead of racing to create the release.
  release-windows:
    name: Build (Windows x64)
    needs: release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      # Privacy gate: block the release if any real/personal data leaked into the
      # shipped demo vault. Runs FIRST so a leak never gets signed/notarized.
      - name: Scrub gate (no personal data in demo vault)
        run: bash scripts/scrub-gate.sh

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20

      - name: Checkout engine (prevail-cli)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          repository: fru-dev3/prevail-cli
          path: engine
      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest
      - name: Install engine deps
        run: cd engine && bun install

      # See the macOS job: a real on-disk playwright-core must be available to
      # stage next to the sidecar, or browser automation breaks in the build.
      - name: Verify engine playwright-core present
        shell: bash
        run: test -f engine/node_modules/playwright-core/package.json || (echo "playwright-core missing from engine deps" && exit 1)

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri -> target

      - name: Install JS dependencies
        run: npm ci

      - name: Build (NSIS installer)
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PREVAIL_CLI_DIR: ${{ github.workspace }}/engine
          # Telemetry client keys (injected from secrets; forks carry none).
          VITE_POSTHOG_KEY: ${{ secrets.VITE_POSTHOG_KEY }}
          VITE_POSTHOG_HOST: ${{ secrets.VITE_POSTHOG_HOST }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          # Sign the updater artifact so the in-app auto-updater accepts Windows
          # builds. (App-level Authenticode signing needs a Windows cert we don't
          # have yet; until then the installer is unsigned and SmartScreen warns.)
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          args: --bundles nsis
          tagName: ${{ github.ref_name }}
          releaseName: "Prevail ${{ github.ref_name }}"
          releaseBody: "See CHANGELOG.md for details."
          releaseDraft: false
          # Release ring: a fresh tag is a PRERELEASE - the auto-updater's
          # 'latest' feed ignores it until `promote` flips it. Soak first.
          prerelease: true

      # Stable-name alias so download links can point at
      # releases/latest/download/Prevail-windows-x64-setup.exe.
      - name: Upload stable-name installer alias
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          exe=$(ls src-tauri/target/release/bundle/nsis/Prevail_*_x64-setup.exe)
          cp "$exe" Prevail-windows-x64-setup.exe
          gh release upload "${{ github.ref_name }}" Prevail-windows-x64-setup.exe --clobber
