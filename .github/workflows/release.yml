name: Release

on:
  push:
    tags:
      - "v*"

# Allow the action to create the GitHub release and upload assets.
permissions:
  contents: write

jobs:
  release:
    name: Build, sign & notarize (macOS universal)
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          # Universal binary needs both arches.
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install JS dependencies
        run: npm ci

      - name: Build, sign & notarize
        uses: tauri-apps/tauri-action@v0
        env:
          # --- GitHub release creation ---
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # --- Developer ID signing ---
          # Base64-encoded .p12 of the Developer ID Application certificate.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # Password that protects the exported .p12.
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # "Developer ID Application: Fru Nde (TXN399AHT5)"
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # Password used to create the temporary CI keychain.
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}

          # --- Notarization (notarytool via Apple ID) ---
          APPLE_ID: ${{ secrets.APPLE_ID }}
          # App-specific password (1Password: "Prevail - Apple Notarization").
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # Team ID: TXN399AHT5
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          # Build a universal binary that runs on Apple Silicon and Intel.
          args: --target universal-apple-darwin
          # Use the pushed tag (v*) as the release tag/name.
          tagName: ${{ github.ref_name }}
          releaseName: "Prevail ${{ github.ref_name }}"
          releaseBody: "See CHANGELOG.md for details."
          releaseDraft: false
          prerelease: false
