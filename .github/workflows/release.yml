name: Release

on:
  push:
    tags:
      - "v*"

# Allow the action to create the GitHub release and upload assets.
permissions:
  contents: write

jobs:
  release:
    name: Build, sign & notarize (Apple Silicon)
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Engine sidecar: check out the CLI repo + Bun so prepare-sidecar.sh (run
      # by beforeBuildCommand) can compile the bundled `prevail` engine in CI.
      - name: Checkout engine (prevail-cli)
        uses: actions/checkout@v4
        with:
          repository: fru-dev3/prevail-cli
          path: engine
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install engine deps
        run: cd engine && bun install

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install JS dependencies
        run: npm ci

      - name: Build, sign & notarize
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Where prepare-sidecar.sh finds the engine repo (checked out above).
          PREVAIL_CLI_DIR: ${{ github.workspace }}/engine
          # --- Developer ID signing + notarization ---
          # GATED on the `SIGNING_READY` repo variable. The APPLE_CERTIFICATE
          # secret was failing to import ("failed to import keychain certificate"),
          # which aborted the whole bundle step and blocked every release. Until
          # the cert is fixed (set repo variable SIGNING_READY=true once it is —
          # see the tauri-mac-sign-notarize skill), these resolve to empty and
          # tauri-action SKIPS Apple signing: the build still produces a working
          # (unsigned-for-Gatekeeper) DMG plus the signed updater feed below, so
          # releases publish instead of failing. Re-enabling needs no code change.
          APPLE_CERTIFICATE: ${{ vars.SIGNING_READY == 'true' && secrets.APPLE_CERTIFICATE || '' }}
          APPLE_CERTIFICATE_PASSWORD: ${{ vars.SIGNING_READY == 'true' && secrets.APPLE_CERTIFICATE_PASSWORD || '' }}
          APPLE_SIGNING_IDENTITY: ${{ vars.SIGNING_READY == 'true' && secrets.APPLE_SIGNING_IDENTITY || '' }}
          KEYCHAIN_PASSWORD: ${{ vars.SIGNING_READY == 'true' && secrets.KEYCHAIN_PASSWORD || '' }}
          APPLE_ID: ${{ vars.SIGNING_READY == 'true' && secrets.APPLE_ID || '' }}
          APPLE_PASSWORD: ${{ vars.SIGNING_READY == 'true' && secrets.APPLE_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ vars.SIGNING_READY == 'true' && secrets.APPLE_TEAM_ID || '' }}
          # --- Updater artifact signing (in-app auto-update feed) ---
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          args: --target aarch64-apple-darwin
          tagName: ${{ github.ref_name }}
          releaseName: "Prevail ${{ github.ref_name }}"
          releaseBody: "See CHANGELOG.md for details."
          releaseDraft: false
          prerelease: false
