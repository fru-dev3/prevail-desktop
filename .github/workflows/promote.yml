# Release ring: promote a soaked prerelease to STABLE (the auto-updater feed).
#
# A fresh tag is published as a prerelease (release.yml), so the in-app
# updater's "latest" feed does NOT ship it to anyone. After it has soaked -
# you have run it, and if telemetry is on, the crash rate looks sane - run
# this to flip it to "latest", at which point every user's auto-updater
# offers it. This is the gate that stops one bad tag from becoming everyone's
# bad day.
name: Promote to stable
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to promote (e.g. v0.2.157)"
        required: true
      i_have_soaked_it:
        description: "Type 'yes' to confirm you installed and ran this build"
        required: true
permissions:
  contents: write
jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - name: Guard
        run: |
          if [ "${{ github.event.inputs.i_have_soaked_it }}" != "yes" ]; then
            echo "::error::Confirm the soak by typing 'yes'."; exit 1
          fi
      - name: Verify the release exists and is currently a prerelease
        env: { GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}" }
        run: |
          pre=$(gh release view "${{ github.event.inputs.tag }}" \
            --repo "${{ github.repository }}" --json isPrerelease -q .isPrerelease)
          echo "prerelease=$pre"
          test "$pre" = "true" || { echo "::error::Not a prerelease (already promoted?)."; exit 1; }
      - name: Flip to latest (stable)
        env: { GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}" }
        run: |
          gh release edit "${{ github.event.inputs.tag }}" \
            --repo "${{ github.repository }}" --prerelease=false --latest
          echo "Promoted ${{ github.event.inputs.tag }} to stable. Auto-updater will offer it."
