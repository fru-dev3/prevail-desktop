# Release ring: roll the stable auto-updater feed BACK to a known-good release.
#
# If a promoted build turns out bad, this re-marks it as a prerelease (pulling
# it out of the "latest" feed) and flips a prior good tag back to "latest".
# Every user's auto-updater then points at the good build again. Two edits,
# no rebuild - the fastest way to stop the bleeding.
name: Rollback stable
on:
  workflow_dispatch:
    inputs:
      bad_tag:
        description: "Bad release to pull from stable (e.g. v0.2.157)"
        required: true
      good_tag:
        description: "Known-good release to restore as latest (e.g. v0.2.156)"
        required: true
permissions:
  contents: write
jobs:
  rollback:
    runs-on: ubuntu-latest
    steps:
      - name: Demote the bad release
        env: { GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}" }
        run: gh release edit "${{ github.event.inputs.bad_tag }}" --repo "${{ github.repository }}" --prerelease=true
      - name: Restore the good release as latest
        env: { GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}" }
        run: |
          gh release edit "${{ github.event.inputs.good_tag }}" --repo "${{ github.repository }}" --prerelease=false --latest
          echo "Rolled stable back to ${{ github.event.inputs.good_tag }}."
