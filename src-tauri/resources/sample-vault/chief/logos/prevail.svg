<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 160" width="480" height="160">
  <rect width="480" height="160" fill="#070B14" rx="12"/>

  <!-- Icon: rising peak / summit mark — two bold strokes meeting at apex -->
  <g transform="translate(28, 20)">
    <!-- Left stroke of the peak -->
    <line x1="8" y1="96" x2="52" y2="22" stroke="#3B82F6" stroke-width="7" stroke-linecap="round"/>
    <!-- Right stroke of the peak -->
    <line x1="52" y1="22" x2="96" y2="96" stroke="#3B82F6" stroke-width="7" stroke-linecap="round"/>
    <!-- Horizontal base bar — grounds it, suggests a platform -->
    <line x1="0" y1="110" x2="104" y2="110" stroke="#1D4ED8" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
    <!-- Apex glow dot -->
    <circle cx="52" cy="22" r="6" fill="#60A5FA"/>
  </g>

  <!-- Wordmark -->
  <text font-family="ui-sans-serif, system-ui, -apple-system, Helvetica, sans-serif"
        font-size="68" font-weight="800" letter-spacing="-2">
    <tspan x="152" y="108" fill="#F1F5F9">prev</tspan><tspan fill="#3B82F6">AI</tspan><tspan fill="#F1F5F9">l</tspan>
  </text>

  <!-- Tagline -->
  <text x="154" y="136"
        font-family="ui-sans-serif, system-ui, -apple-system, Helvetica, sans-serif"
        font-size="13" fill="#64748B" letter-spacing="3" font-weight="400">BE READY. PREVAIL.</text>
</svg>
